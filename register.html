<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MR. RASHAD</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Cairo', sans-serif;
        }

        body {
            height: 100vh;
            background-color: #fff;
            overflow-x: hidden;
        }

        .register-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* --- الجانب الأيمن (الصورة والبراند) --- */
        .image-side {
            flex: 1.2;
            background-color: #00aeef;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        .teacher-img {
            max-width: 80%;
            height: auto;
            z-index: 2;
            object-fit: contain;
            max-height: 85%; 
        }

        .floating-text {
            position: absolute;
            font-size: clamp(5rem, 10vw, 10rem);
            color: rgba(255, 255, 255, 0.15);
            font-weight: 900;
            top: 10%;
            z-index: 1;
        }

        /* --- الجانب الأيسر (الفورم) --- */
        .form-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #ffffff;
            direction: ltr;
        }

        .form-content {
            width: 100%;
            max-width: 400px;
        }

        .welcome-text {
            margin-bottom: 25px;
        }

        .welcome-text h1 {
            font-size: 2rem;
            color: #1e293b;
            font-weight: 800;
        }

        .welcome-text p {
            color: #64748b;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .input-container {
            position: relative;
        }

        .input-container input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .input-container input:focus {
            border-color: #00aeef;
            box-shadow: 0 0 0 4px rgba(0, 174, 239, 0.1);
            background-color: #fff;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background-color: #00aeef;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .register-btn:hover {
            background-color: #0f172a;
            transform: translateY(-2px);
        }

        /* --- الرجوع لتسجيل الدخول --- */
        .login-footer {
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        .login-footer p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .back-to-login {
            color: #0f172a;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .back-to-login:hover {
            color: #00aeef;
        }

        /* --- التنسيق للهاتف (رأسي) --- */
        @media (max-width: 768px) {
            .register-wrapper {
                flex-direction: column;
                height: auto;
            }

            .image-side {
                width: 100%;
                height: 250px;
                flex: none;
            }

            .teacher-img {
                max-width: 160px;
            }

            .form-side {
                width: 100%;
                padding: 30px 20px;
                flex: none;
            }

            .welcome-text h1, .welcome-text p {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        
        <!-- الجانب العلوي (موبايل) / الأيمن (كمبيوتر) -->
        <div class="image-side">
            
            <!-- صورة المستر -->
            <img src="ph/rashad.png" alt="Mr. Rashad" class="teacher-img">
        </div>

        <!-- جانب البيانات -->
        <div class="form-side">
            <div class="form-content">
                <div class="welcome-text">
                    <h1>Create Account</h1>
                    <p>Start your <strong>English</strong> journey today</p>
                </div>

                <form>
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-container">
                            <input type="text" placeholder="Your full name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <div class="input-container">
                            <input type="tel" placeholder="01xxxxxxxxx" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-container">
                            <input type="password" id="passInput" placeholder="Min. 8 characters" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePass()"></i>
                        </div>
                    </div>

                    <button type="submit" class="register-btn">Sign Up Now</button>
                </form>

                <div class="login-footer">
                    <p>Already have an account? 
                        <a href="loge.html" class="back-to-login">Sign In</a>
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('passInput');
            const icon = document.querySelector('.toggle-password');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

</body>
</html>
